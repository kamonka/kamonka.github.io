<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="no-referrer">
  <link rel="shortcut icon" href="https://jyjdsg.dpdns.org/favicon.ico">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background-color: black;
    }
    body {
      font-family: sans-serif;
    }
    mux-player {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 100%;
      box-sizing: border-box;
    }
</style>
<title>今晚看什么</title>
</head>
<body>
<script src="https://cdn.jsdelivr.net/npm/@mux/mux-player" defer></script>
<mux-player
  id="muxPlayer"
  autoplay
  muted
  playsinline
  poster="https://image.mux.com/U1YwiybdCg9UGXjrNGjtqaqsRdaHc00tgVP00u4CKt1vM/thumbnail.webp?&time=01"
  playback-id="U1YwiybdCg9UGXjrNGjtqaqsRdaHc00tgVP00u4CKt1vM"
  metadata-video-title="稀土"
  metadata-viewer-user-id=""
></mux-player>
<script>
  const player = document.getElementById('muxPlayer');
  function isMobileDevice() {
    return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
  }
  function lockLandscape() {
    if (screen.orientation && screen.orientation.lock) {
      screen.orientation.lock('landscape').catch(() => {
        // ignore if not supported or blocked
      });
    }
  }
  function ensurePlay() {
    if (player && typeof player.play === 'function') {
      player.play().catch(() => {
        // Autoplay may be blocked; muted should help most browsers
      });
    }
  }
  window.addEventListener('load', () => {
    if (isMobileDevice()) {
      lockLandscape();
    }
    ensurePlay();
  });
</script>
</body>
</html>

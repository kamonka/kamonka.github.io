<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今晚看什么</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
  
  <!-- Video.js CSS -->
  <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
  
  <!-- HLS.js for m3u8 support -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  
  <!-- Video.js -->
  <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 
                   'Microsoft YaHei', 'Helvetica Neue', Arial, sans-serif;
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .container {
      width: 100vw;
      height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
    }

    .player-container {
      flex: 1;
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #video-player {
      width: 100%;
      height: 100%;
      background: #000;
    }

    /* Enhanced Video.js styling */
    .video-js {
      width: 100% !important;
      height: 100% !important;
      font-family: inherit;
    }

    .video-js .vjs-control-bar {
      background: linear-gradient(to top, rgba(0, 0, 0, 0.95), rgba(0, 0, 0, 0.7));
      height: 5em;
      display: flex;
      font-size: 16px;
    }

    .video-js .vjs-big-play-button {
      width: 3.5em;
      height: 3.5em;
      line-height: 3.5em;
      border-radius: 50%;
      background: rgba(0, 150, 255, 0.95);
      border: 4px solid rgba(255, 255, 255, 0.9);
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      transition: all 0.3s ease;
      font-size: 2.5em;
    }

    .video-js .vjs-big-play-button:hover {
      background: #0096ff;
      transform: translate(-50%, -50%) scale(1.15);
      box-shadow: 0 0 40px rgba(0, 150, 255, 0.8);
    }

    .video-js .vjs-play-progress {
      background: linear-gradient(90deg, #0096ff, #00d4ff);
    }

    .video-js .vjs-volume-level {
      background: linear-gradient(90deg, #0096ff, #00d4ff);
    }

    .video-js .vjs-slider {
      background-color: rgba(255, 255, 255, 0.25);
    }

    .video-js .vjs-load-progress {
      background: rgba(255, 255, 255, 0.35);
    }

    .video-js .vjs-progress-control {
      position: absolute;
      bottom: 4.5em;
      width: 100%;
      height: 1em;
    }

    .video-js .vjs-progress-holder {
      height: 1em;
    }

    .video-js .vjs-play-progress::before {
      font-size: 1.2em;
      top: -0.5em;
    }

    .video-js .vjs-control:hover::before,
    .video-js .vjs-control:focus::before {
      color: #0096ff;
      text-shadow: 0 0 15px rgba(0, 150, 255, 0.8);
    }

    .video-js .vjs-time-control {
      min-width: 4em;
      padding: 0 0.8em;
      font-size: 1.2em;
      line-height: 5em;
    }

    .video-js .vjs-remaining-time {
      display: block;
    }

    .video-js .vjs-volume-panel {
      order: 3;
    }

    .video-js .vjs-playback-rate {
      order: 2;
      font-size: 1.1em;
    }

    .video-js .vjs-fullscreen-control {
      order: 4;
      font-size: 1.6em;
    }

    .video-js .vjs-button > .vjs-icon-placeholder:before {
      font-size: 2em;
      line-height: 2.5;
    }

    /* Loading overlay */
    .loading-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 100;
      opacity: 1;
      transition: opacity 0.5s ease;
    }

    .loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 5px solid rgba(255, 255, 255, 0.2);
      border-top-color: #0096ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      margin-top: 20px;
      color: #fff;
      font-size: 16px;
      font-weight: 500;
    }

    .error-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99;
      padding: 40px;
      text-align: center;
    }

    .error-overlay.show {
      display: flex;
    }

    .error-icon {
      font-size: 80px;
      margin-bottom: 20px;
    }

    .error-title {
      color: #fff;
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 15px;
    }

    .error-message {
      color: rgba(255, 255, 255, 0.7);
      font-size: 16px;
      line-height: 1.6;
      max-width: 600px;
    }

    .error-url {
      margin-top: 20px;
      padding: 15px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 8px;
      color: #0096ff;
      font-size: 14px;
      word-break: break-all;
      max-width: 800px;
    }

    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.9);
      color: #fff;
      padding: 16px 32px;
      border-radius: 12px;
      font-size: 16px;
      opacity: 0;
      transition: opacity 0.3s ease;
      z-index: 10000;
      border: 2px solid rgba(0, 150, 255, 0.5);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(10px);
    }

    .toast.show {
      opacity: 1;
    }

    @media (max-width: 768px) {
      .video-js .vjs-control-bar {
        font-size: 14px;
        height: 4.5em;
      }

      .video-js .vjs-progress-control {
        bottom: 4em;
      }

      .video-js .vjs-big-play-button {
        font-size: 2em;
      }

      .error-title {
        font-size: 22px;
      }

      .error-message {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="player-container">
      <video 
        id="video-player" 
        class="video-js vjs-big-play-centered" 
        controls 
        preload="auto"
        playsinline
        autoplay
      >
        <p class="vjs-no-js">
          要观看此视频，请启用 JavaScript 或升级到支持 HTML5 的浏览器。
        </p>
      </video>

      <div class="loading-overlay" id="loading-overlay">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在加载视频（注意需翻墙）...</div>
      </div>

      <div class="error-overlay" id="error-overlay">
        <div class="error-icon">⚠️</div>
        <div class="error-title">无法加载视频</div>
        <div class="error-message">
          请检查视频地址是否正确，或者该格式是否被支持。<br>
          使用方法：在网址后添加 <strong>?url=视频地址</strong>
        </div>
        <div class="error-url" id="error-url"></div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // 初始化播放器
    const videoElement = document.getElementById('video-player');
    const loadingOverlay = document.getElementById('loading-overlay');
    const errorOverlay = document.getElementById('error-overlay');
    const errorUrlDisplay = document.getElementById('error-url');
    
    let player = videojs('video-player', {
      controls: true,
      autoplay: true,
      preload: 'auto',
      fluid: false,
      responsive: true,
      playbackRates: [0.5, 0.75, 1, 1.25, 1.5, 2],
      controlBar: {
        children: [
          'playToggle',
          'currentTimeDisplay',
          'timeDivider',
          'durationDisplay',
          'progressControl',
          'remainingTimeDisplay',
          'volumePanel',
          'playbackRateMenuButton',
          'fullscreenToggle'
        ]
      }
    });

    let hlsInstance = null;

    // 显示提示消息
    function showToast(message, duration = 2500) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.add('show');
      setTimeout(() => {
        toast.classList.remove('show');
      }, duration);
    }

    // 显示错误
    function showError(url) {
      loadingOverlay.classList.add('hidden');
      errorOverlay.classList.add('show');
      errorUrlDisplay.textContent = url || '未提供视频地址';
    }

    // 隐藏加载
    function hideLoading() {
      loadingOverlay.classList.add('hidden');
    }

    // 检测视频格式
    function detectFormat(url) {
      const urlLower = url.toLowerCase();
      if (urlLower.includes('.m3u8') || urlLower.includes('m3u8')) {
        return 'M3U8';
      } else if (urlLower.includes('.mp4')) {
        return 'MP4';
      } else if (urlLower.includes('.webm')) {
        return 'WebM';
      } else if (urlLower.includes('.ogg') || urlLower.includes('.ogv')) {
        return 'OGG';
      } else if (urlLower.includes('.mov')) {
        return 'MOV';
      }
      return 'AUTO';
    }

    // 加载视频
    function loadVideo(url) {
      if (!url || url.trim() === '') {
        showError('');
        return;
      }

      console.log('Loading video:', url);

      // 清理之前的 HLS 实例
      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
      }

      const format = detectFormat(url);
      const isHLS = url.toLowerCase().includes('m3u8');

      try {
        if (isHLS) {
          // M3U8 格式使用 HLS.js
          if (Hls.isSupported()) {
            hlsInstance = new Hls({
              enableWorker: true,
              lowLatencyMode: true,
              backBufferLength: 90,
              maxBufferLength: 30,
              maxMaxBufferLength: 600
            });

            hlsInstance.loadSource(url);
            hlsInstance.attachMedia(videoElement);

            hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
              console.log('HLS manifest parsed');
              hideLoading();
              showToast('✅ HLS 流加载成功');
              
              // 自动播放
              const playPromise = videoElement.play();
              if (playPromise !== undefined) {
                playPromise.then(() => {
                  console.log('Auto-play started');
                }).catch(error => {
                  console.log('Auto-play prevented:', error);
                  showToast('ℹ️ 请点击播放按钮开始观看');
                });
              }
            });

            hlsInstance.on(Hls.Events.ERROR, function(event, data) {
              console.error('HLS Error:', data);
              if (data.fatal) {
                switch(data.type) {
                  case Hls.ErrorTypes.NETWORK_ERROR:
                    console.log('Network error, trying to recover...');
                    showToast('❌ 网络错误，尝试恢复...');
                    hlsInstance.startLoad();
                    break;
                  case Hls.ErrorTypes.MEDIA_ERROR:
                    console.log('Media error, trying to recover...');
                    showToast('❌ 媒体错误，尝试恢复...');
                    hlsInstance.recoverMediaError();
                    break;
                  default:
                    showError(url);
                    showToast('❌ 无法播放此视频');
                    break;
                }
              }
            });

          } else if (videoElement.canPlayType('application/vnd.apple.mpegurl')) {
            // Safari 原生支持 HLS
            videoElement.src = url;
            hideLoading();
            showToast('✅ 使用原生 HLS 支持');
            
            videoElement.play().catch(error => {
              console.log('Auto-play prevented:', error);
              showToast('ℹ️ 请点击播放按钮开始观看');
            });
          } else {
            showError(url);
            showToast('❌ 当前浏览器不支持 HLS 播放');
          }
        } else {
          // 其他格式直接使用 HTML5 video
          videoElement.src = url;
          
          videoElement.addEventListener('loadeddata', function() {
            console.log('Video loaded');
            hideLoading();
            showToast('✅ 视频加载成功');
          }, { once: true });

          videoElement.addEventListener('canplay', function() {
            console.log('Video can play');
            videoElement.play().catch(error => {
              console.log('Auto-play prevented:', error);
              showToast('ℹ️ 请点击播放按钮开始观看');
            });
          }, { once: true });

          videoElement.addEventListener('error', function(e) {
            console.error('Video error:', e);
            showError(url);
            showToast('❌ 视频加载失败');
          }, { once: true });
        }

      } catch (error) {
        console.error('Load error:', error);
        showError(url);
        showToast('❌ 加载失败：' + error.message);
      }
    }

    // 从 URL 参数获取视频地址并自动播放
    function autoLoadVideo() {
      const params = new URLSearchParams(window.location.search);
      const url = params.get('url');
      
      if (url) {
        const decodedUrl = decodeURIComponent(url);
        console.log('Auto-loading video from URL parameter:', decodedUrl);
        loadVideo(decodedUrl);
      } else {
        showError('');
        console.log('No URL parameter provided');
      }
    }

    // 键盘快捷键
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case ' ':
          e.preventDefault();
          if (videoElement.paused) {
            videoElement.play();
            showToast('▶ 播放');
          } else {
            videoElement.pause();
            showToast('⏸ 暂停');
          }
          break;
        case 'ArrowLeft':
          e.preventDefault();
          videoElement.currentTime = Math.max(0, videoElement.currentTime - 5);
          showToast('⏪ 快退 5秒');
          break;
        case 'ArrowRight':
          e.preventDefault();
          videoElement.currentTime = Math.min(videoElement.duration, videoElement.currentTime + 5);
          showToast('⏩ 快进 5秒');
          break;
        case 'ArrowUp':
          e.preventDefault();
          videoElement.volume = Math.min(1, videoElement.volume + 0.1);
          showToast('🔊 音量: ' + Math.round(videoElement.volume * 100) + '%');
          break;
        case 'ArrowDown':
          e.preventDefault();
          videoElement.volume = Math.max(0, videoElement.volume - 0.1);
          showToast('🔉 音量: ' + Math.round(videoElement.volume * 100) + '%');
          break;
        case 'f':
        case 'F':
          e.preventDefault();
          if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen();
            showToast('⛶ 全屏模式');
          } else {
            document.exitFullscreen();
            showToast('⛶ 退出全屏');
          }
          break;
        case 'm':
        case 'M':
          e.preventDefault();
          videoElement.muted = !videoElement.muted;
          showToast(videoElement.muted ? '🔇 静音' : '🔊 取消静音');
          break;
      }
    });

    // 页面加载时自动播放
    window.addEventListener('DOMContentLoaded', autoLoadVideo);

  </script>
</body>
</html>

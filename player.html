<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>今晚看什么?</title>
  <link rel="shortcut icon" href="https://jyjdsg.dpdns.org/favicon.ico">
  <style>
    html,
    body {
      margin: 0;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    video {
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    #status {
      position: fixed;
      left: 16px;
      bottom: 16px;
      z-index: 2;
      max-width: min(520px, calc(100vw - 32px));
      padding: 8px 10px;
      color: #fff;
      background: rgba(0, 0, 0, 0.68);
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 6px;
      font: 13px/1.45 system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 180ms ease, transform 180ms ease;
      pointer-events: none;
    }

    #status.show {
      opacity: 1;
      transform: translateY(0);
    }

    video::-webkit-media-controls-timeline,
    video::-webkit-media-controls-volume-slider {
      background: rgba(255, 255, 255, 0.14);
      height: 12px;
      border-radius: 6px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.18);
    }

    video::-webkit-media-controls-volume-slider-container {
      background: rgba(255, 255, 255, 0.08);
      border-radius: 6px;
    }

    video::-webkit-media-controls-current-time-display,
    video::-webkit-media-controls-time-remaining-display {
      color: #fff;
      font-size: 14px;
    }

    video::-webkit-media-controls-play-button,
    video::-webkit-media-controls-fullscreen-button {
      filter: brightness(1.5);
    }

    video::-moz-range-track {
      background: rgba(255, 255, 255, 0.14);
      height: 12px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.16);
    }

    video::-moz-range-progress {
      background: #fff;
      height: 12px;
      border-radius: 6px;
    }

    video::-moz-range-thumb {
      width: 14px;
      height: 14px;
      background: #fff;
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 50%;
      box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body>
  <video id="video" controls autoplay playsinline></video>
  <div id="status"></div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById("video");
    const statusBox = document.getElementById("status");
    let hls;
    let statusTimer;
    let cleanedObjectUrl;

    video.crossOrigin = "anonymous";

    const params = new URLSearchParams(window.location.search);
    const videoUrl = params.get("url");
    const cleanEnabled = params.get("clean") !== "0";
    const playlistApi = params.get("api") || params.get("resolver");
    const refererParam = params.get("ref");
    const userAgentParam = params.get("ua") || navigator.userAgent;
    const maxAdDuration = Number(params.get("maxAdDuration") || 90);
    const minMainGroupDuration = Number(params.get("minMainGroupDuration") || 180);
    const adKeywords = (params.get("adKeywords") || "ad,ads,advert,advertise,guanggao,gg,pre-roll,preroll,sponsor")
      .split(",")
      .map(item => item.trim().toLowerCase())
      .filter(Boolean);

    function showStatus(message, persistent = false) {
      statusBox.textContent = message;
      statusBox.classList.add("show");
      clearTimeout(statusTimer);
      if (!persistent) {
        statusTimer = setTimeout(() => statusBox.classList.remove("show"), 3200);
      }
    }

    function isM3u8Url(url) {
      try {
        const parsed = new URL(url, window.location.href);
        const href = `${parsed.pathname}${parsed.search}`.toLowerCase();
        return href.includes(".m3u8") || params.get("type") === "m3u8";
      } catch (error) {
        return /\.m3u8(?:$|[?#])/i.test(url);
      }
    }

    function isHttpUrl(value) {
      return /^https?:\/\//i.test(value);
    }

    function resolvePlaylistUrl(value, baseUrl) {
      return new URL(value, baseUrl).href;
    }

    function createObjectUrl(text) {
      if (cleanedObjectUrl) {
        URL.revokeObjectURL(cleanedObjectUrl);
      }
      cleanedObjectUrl = URL.createObjectURL(new Blob([text], {
        type: "application/vnd.apple.mpegurl"
      }));
      return cleanedObjectUrl;
    }

    function buildPlaylistApiUrl(apiUrl, sourceUrl) {
      const encodedSource = encodeURIComponent(sourceUrl);
      const target = apiUrl.includes("{url}")
        ? apiUrl.replaceAll("{url}", encodedSource)
        : `${apiUrl}${encodedSource}`;
      const parsed = new URL(target, window.location.href);

      if (refererParam && !parsed.searchParams.has("ref")) {
        parsed.searchParams.set("ref", refererParam);
      }

      if (userAgentParam && !parsed.searchParams.has("ua")) {
        parsed.searchParams.set("ua", userAgentParam);
      }

      return parsed.href;
    }

    async function fetchPlaylist(url) {
      const response = await fetch(url, {
        method: "GET",
        mode: "cors",
        cache: "no-store"
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status} ${response.statusText}`);
      }

      return response.text();
    }

    function parseAttributeList(value) {
      const attributes = {};
      const pattern = /([A-Z0-9-]+)=("[^"]*"|[^,]*)/gi;
      let match;

      while ((match = pattern.exec(value))) {
        attributes[match[1].toUpperCase()] = match[2].replace(/^"|"$/g, "");
      }

      return attributes;
    }

    function isMasterPlaylist(text) {
      return /^#EXT-X-STREAM-INF:/m.test(text);
    }

    function selectVariantUrl(masterText, baseUrl) {
      const lines = masterText.split(/\r?\n/);
      const variants = [];

      for (let index = 0; index < lines.length; index += 1) {
        const line = lines[index].trim();
        if (!line.startsWith("#EXT-X-STREAM-INF:")) continue;

        const attributes = parseAttributeList(line.slice("#EXT-X-STREAM-INF:".length));
        let uri = "";
        for (let next = index + 1; next < lines.length; next += 1) {
          const candidate = lines[next].trim();
          if (!candidate || candidate.startsWith("#")) continue;
          uri = candidate;
          break;
        }

        if (uri) {
          variants.push({
            uri: resolvePlaylistUrl(uri, baseUrl),
            bandwidth: Number(attributes.BANDWIDTH || 0)
          });
        }
      }

      if (!variants.length) return "";
      variants.sort((left, right) => right.bandwidth - left.bandwidth);
      return variants[0].uri;
    }

    function parseExtinfDuration(line) {
      const match = line.match(/^#EXTINF:([\d.]+)/i);
      return match ? Number(match[1]) || 0 : 0;
    }

    function uriLooksLikeAd(uri) {
      let inspected = uri.toLowerCase();

      try {
        const parsed = new URL(uri, window.location.href);
        inspected = `${parsed.hostname}${parsed.pathname}`.toLowerCase();
      } catch (error) {
        // Relative URLs are still useful for keyword matching.
      }

      return adKeywords.some(keyword => {
        const escaped = keyword.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
        const pattern = new RegExp(`(^|[./_?=&-])${escaped}($|[./_?=&-])`, "i");
        return pattern.test(inspected);
      });
    }

    function signatureForUri(uri, baseUrl) {
      try {
        const parsed = new URL(uri, baseUrl);
        const path = parsed.pathname.replace(/\/[^/]*$/, "");
        return `${parsed.hostname}${path}`;
      } catch (error) {
        return uri.replace(/\/[^/]*$/, "");
      }
    }

    function parseMediaSegments(text) {
      const lines = text.split(/\r?\n/);
      const header = [];
      const footer = [];
      const segments = [];
      let pendingTags = [];
      let currentDuration = 0;
      let sawSegment = false;
      let waitingForSegmentUri = false;

      for (const rawLine of lines) {
        const line = rawLine.trim();
        if (!line) continue;

        if (line.startsWith("#EXTINF:")) {
          pendingTags.push(line);
          currentDuration = parseExtinfDuration(line);
          waitingForSegmentUri = true;
          continue;
        }

        if (!line.startsWith("#") && waitingForSegmentUri) {
          segments.push({
            tags: pendingTags,
            uri: line,
            duration: currentDuration,
            hasDiscontinuity: pendingTags.some(tag => tag.startsWith("#EXT-X-DISCONTINUITY"))
          });
          pendingTags = [];
          currentDuration = 0;
          sawSegment = true;
          waitingForSegmentUri = false;
          continue;
        }

        if (sawSegment && !waitingForSegmentUri && line.startsWith("#EXT-X-ENDLIST")) {
          footer.push(line);
          continue;
        }

        if (sawSegment || waitingForSegmentUri) {
          pendingTags.push(line);
        } else {
          header.push(line);
        }
      }

      return { header, segments, footer };
    }

    function groupSegments(segments, baseUrl) {
      const groups = [];
      let current = null;

      for (const segment of segments) {
        if (!current || segment.hasDiscontinuity) {
          current = {
            segments: [],
            duration: 0,
            adKeywordHits: 0,
            signatures: new Map()
          };
          groups.push(current);
        }

        current.segments.push(segment);
        current.duration += segment.duration;
        if (uriLooksLikeAd(segment.uri)) current.adKeywordHits += 1;

        const signature = signatureForUri(segment.uri, baseUrl);
        current.signatures.set(signature, (current.signatures.get(signature) || 0) + 1);
      }

      return groups;
    }

    function cleanMediaPlaylist(text, baseUrl) {
      const parsed = parseMediaSegments(text);
      const groups = groupSegments(parsed.segments, baseUrl);
      const longestDuration = Math.max(0, ...groups.map(group => group.duration));
      const cleanedSegments = [];
      const removed = [];

      for (const group of groups) {
        const keywordRatio = group.adKeywordHits / Math.max(group.segments.length, 1);
        const isVeryShortGroup = group.duration > 0 && group.duration <= maxAdDuration;
        const mainVideoExists = longestDuration >= minMainGroupDuration;
        const removeByKeyword = keywordRatio >= 0.5;
        const removeByDiscontinuity = groups.length > 1 && mainVideoExists && isVeryShortGroup && group.duration < longestDuration * 0.35;

        if (removeByKeyword || removeByDiscontinuity) {
          removed.push({
            count: group.segments.length,
            duration: group.duration,
            reason: removeByKeyword ? "关键词" : "短区块"
          });
        } else {
          cleanedSegments.push(...group.segments);
        }
      }

      const lines = [...parsed.header];
      for (const segment of cleanedSegments) {
        lines.push(...segment.tags, resolvePlaylistUrl(segment.uri, baseUrl));
      }
      lines.push(...parsed.footer);

      return {
        text: `${lines.join("\n")}\n`,
        removed,
        originalCount: parsed.segments.length,
        cleanedCount: cleanedSegments.length
      };
    }

    async function buildCleanPlaylistUrl(sourceUrl) {
      showStatus("正在读取 m3u8 清单...", true);

      let playlistUrl = sourceUrl;
      let playlistText = await fetchPlaylist(playlistUrl);

      if (isMasterPlaylist(playlistText)) {
        const variantUrl = selectVariantUrl(playlistText, playlistUrl);
        if (!variantUrl) {
          throw new Error("没有找到可播放的码率清单");
        }

        playlistUrl = variantUrl;
        playlistText = await fetchPlaylist(playlistUrl);
      }

      const result = cleanMediaPlaylist(playlistText, playlistUrl);
      if (!result.originalCount) {
        throw new Error("没有识别到媒体分片");
      }

      const removedDuration = result.removed.reduce((total, item) => total + item.duration, 0);
      const removedCount = result.originalCount - result.cleanedCount;
      if (removedCount > 0) {
        showStatus(`已过滤 ${removedCount} 段，约 ${Math.round(removedDuration)} 秒`);
      } else {
        showStatus("没有发现可过滤的广告片段");
      }

      return createObjectUrl(result.text);
    }

    function attachSource(sourceUrl, forceM3u8 = false) {
      if (hls) {
        hls.destroy();
        hls = null;
      }

      if (forceM3u8 || isM3u8Url(sourceUrl) || sourceUrl.startsWith("blob:")) {
        if (Hls.isSupported()) {
          hls = new Hls({
            enableWorker: true,
            lowLatencyMode: false
          });
          hls.loadSource(sourceUrl);
          hls.attachMedia(video);
          hls.on(Hls.Events.ERROR, (event, data) => {
            console.warn("HLS error:", data);
          });
        } else if (video.canPlayType("application/vnd.apple.mpegurl")) {
          video.src = sourceUrl;
        } else {
          alert("浏览器不支持 M3U8 播放");
        }
      } else if (/\.mp4(?:$|[?#])/i.test(sourceUrl) || isHttpUrl(sourceUrl)) {
        video.src = sourceUrl;
      } else {
        alert("不支持的视频格式");
      }
    }

    async function startPlayback() {
      if (!videoUrl) {
        alert("请在网址后添加 ?url=视频地址");
        return;
      }

      let sourceUrl = videoUrl;
      let forceM3u8 = false;

      if (playlistApi && isM3u8Url(videoUrl)) {
        sourceUrl = buildPlaylistApiUrl(playlistApi, videoUrl);
        forceM3u8 = true;
        showStatus("正在使用服务端 m3u8 解析接口...");
      } else if (cleanEnabled && isM3u8Url(videoUrl)) {
        try {
          sourceUrl = await buildCleanPlaylistUrl(videoUrl);
          forceM3u8 = true;
        } catch (error) {
          console.warn("m3u8 清洗失败，回退到原始地址:", error);
          showStatus(`清洗失败，改用原始播放：${error.message}`);
          sourceUrl = videoUrl;
        }
      }

      attachSource(sourceUrl, forceM3u8);
    }

    ["loadedmetadata", "canplay", "canplaythrough", "progress", "stalled", "suspend", "abort", "emptied", "error"]
      .forEach(eventName => video.addEventListener(eventName, event => console.log("video event:", eventName, event)));

    video.addEventListener("error", () => {
      const error = video.error;
      console.error("video.error:", error);
      if (error) {
        alert(`媒体播放错误: code=${error.code} message=${error.message || "无"}`);
      }
    });

    video.addEventListener("canplay", () => {
      video.play().catch(error => console.warn("播放失败，可能是浏览器自动播放策略限制:", error));

      const fullscreen = video.requestFullscreen ||
        video.webkitRequestFullscreen ||
        video.mozRequestFullScreen ||
        video.msRequestFullscreen;

      if (fullscreen) {
        const fullscreenResult = fullscreen.call(video);
        if (fullscreenResult && typeof fullscreenResult.catch === "function") {
          fullscreenResult.catch(() => {});
        }
      }
    }, { once: true });

    document.addEventListener("keydown", event => {
      switch (event.key) {
        case "ArrowRight":
          video.currentTime += 10;
          break;
        case "ArrowLeft":
          video.currentTime -= 10;
          break;
        case " ":
          event.preventDefault();
          if (video.paused) {
            video.play();
          } else {
            video.pause();
          }
          break;
        default:
          break;
      }
    });

    window.addEventListener("pagehide", () => {
      if (cleanedObjectUrl) URL.revokeObjectURL(cleanedObjectUrl);
    });

    startPlayback();
  </script>
</body>
</html>

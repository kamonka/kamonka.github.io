翻墙订阅设置：

首先第一步，点击下面这个按钮，会自动复制一个链接到剪贴板，复制成功后会有提示。
<p><button type="button" id="copyTextButton">点击这里</button></p>
<p id="copyResult" style="color: green; font-weight: bold;"></p>

1. 打开软件
2. 左上方三个横杠"三"
3. 点击“订阅分组设置”
4. 点击“+”
5. “备注”填写“1”
6. “可选地址”粘帖第一步时复制的链接
7.开启“启用更新”和“启用自动更新”
8. 点击右上方的钩子保存。
9. 返回主界面，点击右上方的三个横杠"三"，点击“更新当前订阅”，等待更新完成后就可以使用了。

<script>
    (function() {
        var clipboardText = "https://kamonka.eu.org/ss/sub"; // 替换为你要复制的特定文字
        var button = document.getElementById("copyTextButton");
        var result = document.getElementById("copyResult");

        button.addEventListener("click", function(event) {
            event.preventDefault();
            if (navigator.clipboard && navigator.clipboard.writeText) {
                navigator.clipboard.writeText(clipboardText).then(function() {
                    result.textContent = "复制成功！";
                }).catch(function() {
                    fallbackCopyText(clipboardText);
                });
            } else {
                fallbackCopyText(clipboardText);
            }
        });

        function fallbackCopyText(text) {
            var textarea = document.createElement("textarea");
            textarea.value = text;
            textarea.style.position = "fixed";
            textarea.style.left = "-9999px";
            document.body.appendChild(textarea);
            textarea.focus();
            textarea.select();
            try {
                var successful = document.execCommand("copy");
                result.textContent = successful ? "成功！去你的APP粘贴吧" : "复制失败，请手动复制";
            } catch (err) {
                result.textContent = "复制失败，请手动复制";
            }
            document.body.removeChild(textarea);
        }
    })();
</script>
